global:
  scrape_interval: 15s
  evaluation_interval: 15s

# SLO recording + burn-rate alerting rules (test files are *.test.yml, excluded by this glob).
rule_files:
  - /etc/prometheus/rules/*.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'task-manager-api'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          environment: 'development'
