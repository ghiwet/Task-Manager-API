name: Release

# Publish a container image only when a version tag is pushed (e.g. v1.2.3), not on every commit.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create a GitHub Release for the tag
  packages: write   # push the image to GHCR

jobs:
  publish-image:
    name: Build & publish image to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # CI validates tests on main; the release build just packages the jar the image needs.
      - name: Build jar
        run: ./mvnw -B package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags from the git tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: latest=true

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: target/*.jar
          body: |
            Container image: `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`
