name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:   # reused by release.yml to gate publishing on the test suite

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      # Stable path for the ONNX embedding model so it is cached across runs instead of being
      # re-downloaded (~90MB) each time. Overrides the application.properties default via Spring
      # relaxed binding; the env is inherited by the Surefire fork.
      SPRING_AI_EMBEDDING_TRANSFORMER_CACHE_DIRECTORY: ${{ github.workspace }}/.onnx-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Cache ONNX embedding model
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.onnx-cache
          key: spring-ai-onnx-all-MiniLM-L6-v2

      # Tests use Testcontainers (Docker is preinstalled on ubuntu-latest) and EmbeddedKafka;
      # they need no external services or secrets.
      - name: Build and test
        run: ./mvnw -B verify

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore
