name: Manual Java Security Scan

on:
  workflow_dispatch:  # Manually triggered
permissions:
  contents: read
  issues: write  

jobs:
  codeql:
    name: CodeQL Static Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          build-mode: manual   # we build with Maven below; CodeQL traces it

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Build with Maven
        run: ./mvnw clean install -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    # Semgrep scans source, so no Java build is needed; run in the maintained image.
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config=p/ci --sarif --output=semgrep.sarif
        continue-on-error: true

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TODO: pin @main to a released tag once verified. The NVD API rate-limits without a
      # key, so add an NVD_API_KEY repo secret (https://nvd.nist.gov/developers/request-an-api-key)
      # or the DB download will be very slow / time out.
      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'java-app'
          path: './'
          format: 'HTML'
          args: ${{ secrets.NVD_API_KEY && format('--nvdApiKey {0}', secrets.NVD_API_KEY) || '' }}

      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: dependency-check-report.html

  secret-scan:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run TruffleHog (filesystem scan, JSON report)
        run: |
         docker run --rm -v ${{ github.workspace }}:/repo ghcr.io/trufflesecurity/trufflehog:latest \
         filesystem /repo --json > trufflehog-report.json

      - name: Upload TruffleHog Report
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-json
          path: trufflehog-report.json

  zap-scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Start Containers
        run: docker compose -f docker-compose.yml up --detach

      - name: Build the app
        run: ./mvnw clean package -DskipTests

      - name: Start the app in background
        run: |
          java -jar target/*.jar --server.address=0.0.0.0 &
          sleep 20  # Wait for server to be ready

      - name: Wait for app to be ready
        run: |
          echo "Waiting for app to be ready..."
          for i in {1..10}; do
            curl -sSf http://localhost:8080/swagger-ui/index.html && echo "App is ready!" && exit 0
            sleep 5
          done
          echo "App not ready in time!" && exit 1

      - name: Set write permissions on workspace
        run: sudo chmod -R a+w ${{ github.workspace }}

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8080/swagger-ui/index.html'
          fail_action: false
          allow_issue_writing: false
          rules_file_name: '.zap/rules.tsv'
          artifact_name: zap-scan-report
          cmd_options: '-r report_html.html -a'
