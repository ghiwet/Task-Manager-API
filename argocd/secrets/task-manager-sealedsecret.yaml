    KEYCLOAK_CLIENT_SECRET: 
    OPENAI_API_KEY: 
    SPRING_DATASOURCE_PASSWORD: 
    SPRING_FLYWAY_PASSWORD: 
  template:
    metadata:
      name: task-manager-task-manager-secret
      namespace: task-manager
