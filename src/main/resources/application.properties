spring.datasource.url=jdbc:postgresql://localhost:5433/taskdb
# Runtime app role: non-owner, least-privilege, subject to row-level security (created in V5).
spring.datasource.username=app_rls
spring.datasource.password=app_rls_pass
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.validateMigrationNaming=true
# Migrations run as the privileged owner role (bypasses RLS, can create roles/policies).
spring.flyway.user=taskuser
spring.flyway.password=taskpass
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

KEYCLOAK_CLIENT_ID=springboot-app
KEYCLOAK_CLIENT_SECRET=secret123
BASE_URL=http://localhost:8080
KEYCLOAK_BASE_URL=http://localhost:8082

# === OAuth2 Client Registration for Keycloak ===
spring.security.oauth2.client.registration.keycloak.client-id=${KEYCLOAK_CLIENT_ID}
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET}
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri=${BASE_URL}/login/oauth2/code/keycloak
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email

# === OAuth2 Provider Settings for Keycloak ===
spring.security.oauth2.client.provider.keycloak.issuer-uri=${KEYCLOAK_BASE_URL}/realms/myrealm
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username

# For Swagger integration
springdoc.oAuthFlow.authorizationUrl=${KEYCLOAK_BASE_URL}/realms/myrealm/protocol/openid-connect/auth
springdoc.oAuthFlow.tokenUrl=${KEYCLOAK_BASE_URL}/realms/myrealm/protocol/openid-connect/token
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_BASE_URL}/realms/myrealm

# === Transactional Outbox ===
# The relay polls the outbox for unpublished events and sends them to Kafka.
outbox.relay.poll-interval-ms=2000
outbox.cleanup.interval-ms=3600000

# === Kafka Configuration ===
spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.consumer.group-id=task-notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.taskmanager.event
# Propagate trace context across Kafka so producer and consumer share one trace.
spring.kafka.template.observation-enabled=true
spring.kafka.listener.observation-enabled=true

# === Actuator & Observability ===
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=task-manager-api
management.prometheus.metrics.export.enabled=true

# === Distributed Tracing (OpenTelemetry -> Tempo) ===
spring.application.name=task-manager-api
management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces
# Starter bundles an OTLP metrics registry; keep metrics on the Prometheus pipeline.
management.otlp.metrics.export.enabled=false

# === AI Assistant (Spring AI) ===
# OpenAI for chat; embeddings run locally via the ONNX transformers model (no embedding API).
spring.ai.model.chat=openai
spring.ai.model.embedding=transformers
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4o-mini
# The vector_store table is created by Flyway (V6); Spring AI must not manage or validate the schema.
spring.ai.vectorstore.pgvector.initialize-schema=false
spring.ai.vectorstore.pgvector.schema-validation=false
spring.ai.vectorstore.pgvector.dimensions=384
# Read timeout for the chat call so a hung OpenAI request can't block the request thread.
spring.ai.openai.chat.timeout=30s

# === Resilience (OpenAI chat call) ===
# Retry only transient OpenAI failures (rate limit, 5xx, IO); never 4xx (auth/bad request).
resilience4j.retry.instances.openai.max-attempts=3
resilience4j.retry.instances.openai.wait-duration=1s
resilience4j.retry.instances.openai.enable-exponential-backoff=true
resilience4j.retry.instances.openai.exponential-backoff-multiplier=2
resilience4j.retry.instances.openai.retry-exceptions=com.openai.errors.RateLimitException,com.openai.errors.InternalServerException,com.openai.errors.OpenAIIoException
# Open the circuit on sustained transient failures so we fail fast instead of hammering a down API.
resilience4j.circuitbreaker.instances.openai.sliding-window-size=10
resilience4j.circuitbreaker.instances.openai.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.openai.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.openai.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.openai.record-exceptions=com.openai.errors.RateLimitException,com.openai.errors.InternalServerException,com.openai.errors.OpenAIIoException

# === Redis (distributed rate limiting; also the cache backend) ===
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# === Elasticsearch (full-text task search) ===
spring.elasticsearch.uris=${ELASTICSEARCH_URIS:http://localhost:9200}
# Cache-aside TTL for task lookups (evicted on update/delete).
cache.tasks.ttl-minutes=10

# === Rate Limiting ===
# Buckets are stored in Redis so the limit is shared across replicas. If Redis is unavailable the
# filter fails open (allows the request) rather than blocking traffic.
rate-limit.enabled=true
rate-limit.public-requests-per-minute=20
rate-limit.authenticated-requests-per-minute=60
rate-limit.registration-requests-per-minute=5
rate-limit.assistant-requests-per-minute=10